<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/geral :: head}"></head>

<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <nav th:replace="~{fragments/geral :: navbar}"></nav>
    <aside th:replace="~{fragments/geral :: sidebar}"></aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2 align-items-center">
                    <div class="col-sm-6">
                        <h1 class="m-0 font-weight-bold text-dark"><i class="fas fa-users text-muted mr-2"></i>Fornecedores / Parceiros</h1>
                        <p class="text-muted text-sm mb-0">Base de dados para vincular aos lançamentos do sistema.</p>
                    </div>
                    <div class="col-sm-6 text-right">
                        <button type="button" class="btn btn-dark shadow-sm font-weight-bold" data-toggle="modal" data-target="#modal-novo-cliente">
                            <i class="fas fa-plus mr-1"></i> Novo Cadastro
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div th:if="${mensagemErro}" class="alert alert-danger alert-dismissible shadow-sm">
                    <button type="button" class="close" data-dismiss="alert" aria-hidden="true">&times;</button>
                    <h5><i class="icon fas fa-ban"></i> Ops!</h5>
                    <span th:text="${mensagemErro}"></span>
                </div>

                <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible shadow-sm">
                    <button type="button" class="close" data-dismiss="alert" aria-hidden="true">&times;</button>
                    <h5><i class="icon fas fa-check"></i> Sucesso!</h5>
                    <span th:text="${mensagemSucesso}"></span>
                </div>

                <div class="card shadow-sm border-top border-dark">
                    <div class="card-body p-0">
                        <table id="tabela-clientes" class="table table-striped table-valign-middle mb-0">
                            <thead class="bg-light">
                            <tr>
                                <th>Empresa</th>
                                <th>Tipo</th>
                                <th>Responsável</th>
                                <th>E-mail</th>
                                <th>Telefone / WhatsApp</th>
                                <th>Ações</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="cliente : ${clientes}">
                                <td class="font-weight-bold text-dark" th:text="${cliente.nomeEmpresa}"></td>
                                <td>
                                    <span th:if="${cliente.tipoParceiro?.name() == 'CLIENTE'}" class="badge badge-primary">Cliente</span>
                                    <span th:if="${cliente.tipoParceiro?.name() == 'FORNECEDOR'}" class="badge badge-warning text-dark">Fornecedor</span>
                                    <span th:if="${cliente.tipoParceiro?.name() == 'AMBOS'}" class="badge badge-info">Ambos</span>
                                </td>
                                <td th:text="${cliente.nomeResponsavel}"></td>
                                <td th:text="${cliente.email}"></td>
                                <td th:text="${cliente.telefone}"></td>
                                <td class="text-nowrap">
                                    <button type="button" class="btn btn-sm btn-info" data-toggle="modal"
                                            data-target="#modal-editar-cliente"
                                            title="Editar Cadastro"
                                            th:data-id="${cliente.id}"
                                            th:data-nome="${cliente.nomeEmpresa}"
                                            th:data-responsavel="${cliente.nomeResponsavel}"
                                            th:data-cpf="${cliente.cnpj}"
                                            th:data-telefone="${cliente.telefone}"
                                            th:data-email="${cliente.email}"
                                            th:data-tipo="${cliente.tipoParceiro?.name()}">
                                        <i class="fas fa-pen"></i>
                                    </button>

                                    <a th:href="@{/clientes/excluir/{id}(id=${cliente.id})}"
                                       class="btn btn-sm btn-danger"
                                       title="Excluir"
                                       onclick="return confirm('Tem certeza? Isso apaga o registro para sempre.');">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(clientes)}">
                                <td colspan="6" class="text-center text-muted p-4">Nenhum parceiro cadastrado ainda.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer th:replace="~{fragments/geral :: footer}"></footer>
</div>

<div class="modal fade" id="modal-novo-cliente">
    <div class="modal-dialog modal-lg">
        <div class="modal-content shadow border-0">
            <form th:action="@{/clientes/salvar}" method="POST">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title font-weight-bold"><i class="fas fa-building mr-2"></i>Novo Cadastro</h5>
                    <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
                </div>
                <div class="modal-body bg-light">

                    <div class="form-group bg-white p-3 rounded border shadow-sm">
                        <label class="text-dark font-weight-bold"><i class="fas fa-handshake mr-1 text-muted"></i> Tipo de Relação</label>
                        <select name="tipoParceiro" class="form-control font-weight-bold" required>
                            <option value="FORNECEDOR">Fornecedor (Gera Despesas para o Caixa)</option>
                            <option value="CLIENTE">Cliente / Patrocinador (Gera Receitas)</option>
                            <option value="AMBOS">Ambos (Compra e Vende)</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label class="text-sm font-weight-bold">Nome da Empresa / Fantasia</label>
                            <input type="text" name="nomeEmpresa" class="form-control" placeholder="Ex: Distribuidora X" required>
                        </div>
                        <div class="col-md-6 form-group">
                            <label class="text-sm font-weight-bold">Nome do Responsável / Contato <span class="text-muted font-weight-normal text-xs">(Opcional)</span></label>
                            <input type="text" name="nomeResponsavel" class="form-control" placeholder="Ex: Carlos Roberto">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 form-group">
                            <label class="text-sm font-weight-bold">CPF ou CNPJ</label>
                            <input type="text" name="cnpj" class="form-control mask-cpf-cnpj" placeholder="000.000.000-00">
                        </div>
                        <div class="col-md-4 form-group">
                            <label class="text-sm font-weight-bold">WhatsApp / Telefone</label>
                            <input type="text" name="telefone" class="form-control mask-telefone" placeholder="(00) 00000-0000">
                        </div>
                        <div class="col-md-4 form-group">
                            <label class="text-sm font-weight-bold">E-mail</label>
                            <input type="email" name="email" class="form-control" placeholder="contato@empresa.com">
                        </div>
                    </div>

                </div>
                <div class="modal-footer justify-content-between bg-light border-0">
                    <button type="button" class="btn btn-default shadow-sm" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-dark font-weight-bold shadow-sm"><i class="fas fa-save mr-1"></i> Salvar Cadastro</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modal-editar-cliente">
    <div class="modal-dialog modal-lg">
        <div class="modal-content shadow border-0">
            <form th:action="@{/clientes/salvar}" method="POST">
                <div class="modal-header bg-info text-white border-0">
                    <h5 class="modal-title font-weight-bold"><i class="fas fa-pen mr-2"></i>Editar Cadastro</h5>
                    <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
                </div>
                <div class="modal-body bg-light">

                    <input type="hidden" id="edit-id" name="id">

                    <div class="form-group bg-white p-3 rounded border shadow-sm mb-3">
                        <label class="text-info font-weight-bold"><i class="fas fa-handshake mr-1"></i> Tipo de Relação</label>
                        <select id="edit-tipo" name="tipoParceiro" class="form-control font-weight-bold" required>
                            <option value="FORNECEDOR">Fornecedor (Gera Despesas para o Caixa)</option>
                            <option value="CLIENTE">Cliente / Patrocinador (Gera Receitas)</option>
                            <option value="AMBOS">Ambos (Compra e Vende)</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label class="text-sm font-weight-bold">Empresa</label>
                            <input type="text" id="edit-nome" name="nomeEmpresa" class="form-control" required>
                        </div>
                        <div class="col-md-6 form-group">
                            <label class="text-sm font-weight-bold">Nome Responsável<span class="text-muted font-weight-normal text-xs">(Opcional)</span></label>
                            <input type="text" id="edit-responsavel" name="nomeResponsavel" class="form-control">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 form-group">
                            <label class="text-sm font-weight-bold">CPF/CNPJ<span class="text-muted font-weight-normal text-xs">(Opcional)</span></label>
                            <input type="text" id="edit-cpf" name="cnpj" class="form-control mask-cpf-cnpj">
                        </div>
                        <div class="col-md-4 form-group">
                            <label class="text-sm font-weight-bold">Telefone<span class="text-muted font-weight-normal text-xs">(Opcional)</span></label>
                            <input type="text" id="edit-telefone" name="telefone" class="form-control mask-telefone">
                        </div>
                        <div class="col-md-4 form-group">
                            <label class="text-sm font-weight-bold">E-mail<span class="text-muted font-weight-normal text-xs">(Opcional)</span></label>
                            <input type="email" id="edit-email" name="email" class="form-control">
                        </div>
                    </div>

                </div>
                <div class="modal-footer justify-content-between bg-light border-0">
                    <button type="button" class="btn btn-default shadow-sm" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-info font-weight-bold shadow-sm"><i class="fas fa-save mr-1"></i> Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/geral :: scripts}"></div>

<script th:inline="none">
    $(function () {
        // Inicializa a tabela de parceiros
        $("#tabela-clientes").DataTable({
            "responsive": true, "lengthChange": false, "autoWidth": false,
            "language": { "url": "//cdn.datatables.net/plug-ins/1.11.5/i18n/pt-BR.json" },
            "columnDefs": [ { "orderable": false, "targets": [5] } ] // Trava a ordenação na coluna de Ações
        });

        // LÓGICA DO MODAL EDITAR (Limpada)
        $('#modal-editar-cliente').on('show.bs.modal', function (event) {
            var button = $(event.relatedTarget);
            var modal = $(this);

            modal.find('#edit-id').val(button.data('id'));
            modal.find('#edit-tipo').val(button.data('tipo'));
            modal.find('#edit-nome').val(button.data('nome'));
            modal.find('#edit-responsavel').val(button.data('responsavel'));
            modal.find('#edit-cpf').val(button.data('cpf')).trigger('input');
            modal.find('#edit-telefone').val(button.data('telefone')).trigger('input');
            modal.find('#edit-email').val(button.data('email'));
        });

        // Reseta o modal de criação quando ele fecha
        $('#modal-novo-cliente').on('hidden.bs.modal', function () {
            $(this).find('form')[0].reset();
        });
    });
</script>
</body>
</html>

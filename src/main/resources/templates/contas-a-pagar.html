<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/geral :: head}"></head>

<body class="hold-transition sidebar-mini layout-fixed bg-light">
<script>
    if (localStorage.getItem('menuFechado') === 'true') document.body.classList.add('sidebar-collapse');
</script>

<style>
    .card-modern { border-radius: 12px; border: none; transition: transform 0.2s; }
    .card-modern:hover { transform: translateY(-5px); }
    .text-money { font-family: 'Courier New', Courier, monospace; letter-spacing: -0.5px; }
</style>

<div class="wrapper">
    <nav th:replace="~{fragments/geral :: navbar}"></nav>
    <aside th:replace="~{fragments/geral :: sidebar}"></aside>

    <div class="content-wrapper px-3 py-4">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
            <div class="mb-2">
                <h2 class="m-0 font-weight-bold text-dark" style="letter-spacing: -1px;">
                    <i class="fas fa-exclamation-circle text-danger mr-2"></i>Contas a Pagar
                </h2>
                <p class="text-muted text-sm mb-0">Lançamentos que <b>ainda estão pendentes</b> de pagamento.</p>
            </div>

            <div class="d-flex align-items-center flex-wrap">
                <form action="/contas-a-pagar" method="GET" class="form-inline bg-white p-2 rounded-pill shadow-sm border mr-3 mb-2">
                    <i class="fas fa-calendar-alt mx-3 text-danger"></i>
                    <select name="mes" class="form-control form-control-sm border-0 bg-transparent text-dark font-weight-bold" onchange="this.form.submit()">
                        <option value="1" th:selected="${mesSelecionado == 1}">Janeiro</option>
                        <option value="2" th:selected="${mesSelecionado == 2}">Fevereiro</option>
                        <option value="3" th:selected="${mesSelecionado == 3}">Março</option>
                        <option value="4" th:selected="${mesSelecionado == 4}">Abril</option>
                        <option value="5" th:selected="${mesSelecionado == 5}">Maio</option>
                        <option value="6" th:selected="${mesSelecionado == 6}">Junho</option>
                        <option value="7" th:selected="${mesSelecionado == 7}">Julho</option>
                        <option value="8" th:selected="${mesSelecionado == 8}">Agosto</option>
                        <option value="9" th:selected="${mesSelecionado == 9}">Setembro</option>
                        <option value="10" th:selected="${mesSelecionado == 10}">Outubro</option>
                        <option value="11" th:selected="${mesSelecionado == 11}">Novembro</option>
                        <option value="12" th:selected="${mesSelecionado == 12}">Dezembro</option>
                    </select>
                    <span class="mx-2 text-muted">/</span>
                    <input type="number" name="ano" class="form-control form-control-sm border-0 bg-transparent text-dark font-weight-bold" style="width: 70px;" th:value="${anoSelecionado}" onchange="this.form.submit()">
                </form>

                <div class="btn-group shadow-sm mr-3 mb-2">
                    <a href="/contas-a-pagar" class="btn btn-danger font-weight-bold active"><i class="fas fa-exclamation-circle mr-1"></i> A Pagar</a>
                    <a href="/despesas" class="btn btn-outline-success font-weight-bold"><i class="fas fa-check-double mr-1"></i> Saídas</a>
                </div>

                <button class="btn btn-dark font-weight-bold shadow-sm rounded-pill px-4 py-2 mb-2" data-toggle="modal" data-target="#modal-nova-despesa" onclick="$('select[name=status]').val('PENDENTE');">
                    <i class="fas fa-plus mr-1"></i> Nova Pendência
                </button>
            </div>
        </div>

        <section class="content p-0">
            <div class="container-fluid p-0">
                <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible shadow-sm mb-4">
                    <button type="button" class="close" data-dismiss="alert" aria-hidden="true">&times;</button>
                    <h5><i class="icon fas fa-check"></i> Sucesso!</h5>
                    <span th:text="${mensagemSucesso}"></span>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <div class="card card-modern border-0 shadow-sm p-3 h-100 d-flex flex-row align-items-center justify-content-between" style="border-left: 5px solid #dc3545 !important;">
                            <div>
                                <p class="text-muted text-xs text-uppercase font-weight-bold mb-1">Total Pendente (A Pagar)</p>
                                <h3 class="font-weight-bold text-danger m-0 text-money" th:text="'R$ ' + ${#numbers.formatDecimal(totalPendente, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</h3>
                            </div>
                            <div class="icon-box rounded-lg d-flex align-items-center justify-content-center" style="width: 50px; height: 50px; background: rgba(220, 53, 69, 0.1); color: #dc3545;">
                                <i class="fas fa-exclamation-triangle fa-lg"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0" style="border-radius: 12px; border-top: 4px solid #dc3545 !important; overflow: hidden;">
                    <div class="card-body p-0">
                        <div class="table-responsive text-nowrap">
                            <table class="table table-hover table-valign-middle mb-0 text-sm">
                                <thead class="bg-light text-muted">
                                <tr>
                                    <th>Vencimento</th>
                                    <th>Descrição</th>
                                    <th>Favorecido</th>
                                    <th>Categoria</th>
                                    <th>Valor Pendente</th>
                                    <th class="text-center">Ação</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="despesa : ${despesas}" style="background-color: rgba(220, 53, 69, 0.03);">
                                    <td class="font-weight-bold text-danger"><i class="far fa-calendar-alt mr-1"></i> <span th:text="${#temporals.format(despesa.dataLancamento, 'dd/MM/yyyy')}"></span></td>
                                    <td class="font-weight-bold text-dark" th:text="${despesa.descricao}"></td>
                                    <td th:text="${despesa.fornecedor != null ? despesa.fornecedor.nomeEmpresa : 'Avulso'}"></td>
                                    <td><span class="badge badge-warning" th:text="${despesa.categoria.descricao}"></span></td>
                                    <td class="text-danger font-weight-bold text-money" th:text="'R$ ' + ${#numbers.formatDecimal(despesa.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                                    <td class="text-center">
                                        <a th:href="@{/despesas/pagar/{id}(id=${despesa.id})}" class="btn btn-sm btn-success shadow-sm font-weight-bold rounded-pill px-3" onclick="return confirm('Dinheiro saiu do caixa? Confirmar pagamento?');">
                                            <i class="fas fa-check-circle mr-1"></i> Dar Baixa
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(despesas)}">
                                    <td colspan="6" class="text-center text-muted p-5">
                                        <i class="fas fa-glass-cheers fa-3x text-light mb-3"></i><br>
                                        Nenhuma conta a pagar pendente neste mês! Caixa limpo!
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <footer th:replace="~{fragments/geral :: footer}"></footer>
</div>

<div class="modal fade" id="modal-nova-categoria" style="z-index: 1060;">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <form th:action="@{/categorias/salvar}" method="POST">
                <div class="modal-header bg-warning text-dark border-0">
                    <h5 class="modal-title font-weight-bold"><i class="fas fa-tags mr-2"></i>Nova Categoria</h5>
                    <button type="button" class="close text-dark" data-dismiss="modal"><span>&times;</span></button>
                </div>
                <div class="modal-body bg-light">
                    <div class="form-group">
                        <label class="text-xs text-muted text-uppercase font-weight-bold">Nome da Categoria</label>
                        <input type="text" name="descricao" class="form-control font-weight-bold text-dark" placeholder="Ex: Manutenção..." required>
                    </div>
                    <div class="form-group mb-0">
                        <label class="text-xs text-muted text-uppercase font-weight-bold">Classificação</label>
                        <select name="tipo" class="form-control font-weight-bold text-dark" required>
                            <option value="">Selecione...</option>
                            <option th:each="tipo : ${tiposCategoria}" th:value="${tipo}" th:text="${tipo.name() == 'PROVISAO' ? 'Provisão (Caixinha)' : 'Custo Variável / Fixo'}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer justify-content-between border-0 bg-light">
                    <button type="button" class="btn btn-sm btn-default font-weight-bold shadow-sm" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-sm btn-warning font-weight-bold shadow-sm">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modal-nova-despesa">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow-lg">
            <form th:action="@{/despesas/salvar}" method="POST">

                <div class="modal-header text-white border-0" style="background: linear-gradient(135deg, #343a40 0%, #1d2124 100%);">
                    <h4 class="modal-title font-weight-bold"><i class="fas fa-file-invoice-dollar text-success mr-2"></i>Lançar Saída</h4>
                    <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
                </div>

                <div class="modal-body" style="background-color: #f4f6f9;">

                    <div class="row mb-3">
                        <div class="col-12">
                            <div class="p-3 rounded border shadow-sm" style="background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%); border-left: 5px solid #17a2b8 !important;">
                                <label class="text-sm font-weight-bold text-dark"><i class="fas fa-traffic-light text-info mr-1"></i> Para qual tela vai este lançamento?</label>
                                <select name="status" class="form-control font-weight-bold form-control-lg shadow-sm" style="border: 2px solid #17a2b8;" required>
                                    <option value="PENDENTE" class="text-danger font-weight-bold">A PAGAR (Aba de Pendências)</option>
                                    <option value="PAGO" class="text-success font-weight-bold">JÁ PAGO (Aba de Saídas)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label class="text-sm font-weight-bold text-dark"><i class="far fa-calendar-alt text-primary mr-1"></i> Data Vencimento</label>
                                <input type="date" name="dataLancamento" class="form-control font-weight-bold" style="border: 1px solid #ced4da;" required>
                            </div>
                        </div>
                        <div class="col-md-8">
                            <div class="form-group">
                                <label class="text-sm font-weight-bold text-dark"><i class="fas fa-comment-dots text-secondary mr-1"></i> Observações</label>
                                <input type="text" name="descricao" class="form-control" placeholder="(Opcional) Detalhes do lançamento...">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="text-sm font-weight-bold text-dark"><i class="fas fa-building text-warning mr-1"></i> Fornecedor / Beneficiário</label>
                                <select name="fornecedorId" class="form-control select2" style="width: 100%;">
                                    <option value="">Nenhum (Despesa Avulsa)</option>
                                    <option th:each="f : ${fornecedores}" th:value="${f.id}" th:text="${f.nomeEmpresa}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="text-sm font-weight-bold text-dark"><i class="fas fa-wallet text-success mr-1"></i> Forma de Pagamento</label>
                                <select name="formaPagamento" class="form-control font-weight-bold" required>
                                    <option th:each="forma : ${formasPagamento}" th:value="${forma}" th:text="${forma}" th:selected="${forma.name() == 'PIX'}"></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row bg-white p-3 rounded border mx-0 shadow-sm mt-2" style="border-left: 4px solid #28a745 !important;">
                        <div class="col-md-4">
                            <div class="form-group mb-0">
                                <label class="text-sm text-dark font-weight-bold">Nº Doc.</label>
                                <input type="text" name="numeroDocumento" class="form-control" placeholder="Opcional">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group mb-0">
                                <label class="text-sm text-dark font-weight-bold">Categoria</label>
                                <div class="input-group">
                                    <select name="categoria.id" class="form-control font-weight-bold" required>
                                        <option value="">Selecione</option>
                                        <option th:each="cat : ${categorias}"
                                                th:value="${cat.id}"
                                                th:text="${cat.descricao + (cat.tipo.name() == 'PROVISAO' ? ' [CAIXINHA]' : ' [CUSTO GERAL]')}"></option>
                                    </select>
                                    <div class="input-group-append">
                                        <button type="button" class="btn btn-warning px-2" data-toggle="modal" data-target="#modal-nova-categoria" title="Criar Categoria">
                                            <i class="fas fa-plus"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group mb-0">
                                <label class="text-sm text-danger font-weight-bold">Valor (R$)</label>
                                <input type="number" step="0.01" name="valor" class="form-control font-weight-bold text-danger form-control" placeholder="0.00" required>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="modal-footer justify-content-between border-0 bg-white">
                    <button type="button" class="btn btn-outline-secondary font-weight-bold shadow-sm px-4" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-dark font-weight-bold shadow-sm px-4"><i class="fas fa-save text-success mr-1"></i> Confirmar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/geral :: scripts}"></div>
<script th:inline="none">
    $(function () {
        $('.select2').select2({theme: 'bootstrap4', dropdownParent: $('#modal-nova-despesa')});
        $('#modal-nova-despesa').on('hidden.bs.modal', function () {
            $(this).find('form')[0].reset();
            // Reseta pro PIX de novo toda vez que fechar e abrir
            $(this).find('select[name="formaPagamento"]').val('PIX').trigger('change');
            $(this).find('.select2').val('').trigger('change');
        });
    });
</script>
</body>
</html>

name: Deploy Automático SaaS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar o código do repositório
        uses: actions/checkout@v3

      - name: 2. Preparar o ambiente Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. Construir e Preparar o Pacote
        run: |
          mvn clean package -DskipTests
          rm -f target/*-plain.jar || true
          mv target/*.jar target/app.jar

      - name: 4. Enviar para a Oracle (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "target/app.jar"
          target: "/home/ubuntu"
          strip_components: 1

      - name: 5. O Golpe Final Nativo (SSH Raiz)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.HOST }} "cd /home/ubuntu && sudo pkill -f 'java -jar' || true && sleep 3 && DB_URL='${{ secrets.DB_URL }}' DB_USER='${{ secrets.DB_USER }}' DB_PASSWORD='${{ secrets.DB_PASSWORD }}' nohup java -jar app.jar > log_do_sistema.txt 2>&1 </dev/null &"mctl restart titu